<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:#fff;
            padding:40px;
            width:400px;
            text-align:center;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
        }

        .check{
            width:80px;
            height:80px;
            background:#28a745;
            color:white;
            font-size:40px;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:0 auto 20px;
        }

        h1{
            color:#28a745;
            margin-bottom:15px;
        }

        p{
            color:#555;
            margin-bottom:25px;
            line-height:1.6;
        }

        a{
            text-decoration:none;
            background:#007bff;
            color:white;
            padding:12px 25px;
            border-radius:6px;
            transition:0.3s;
        }

        a:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>
    <!-- {% csrf_token %} -->

    <div class="container">
        <div class="check">✓</div>

        <h1>Thank You!</h1>

        <p>
            Your form has been submitted successfully.<br>
            We appreciate your response.
        </p>

        <a href="/">Go Back to Home</a>
    </div>

</body>
</html>
